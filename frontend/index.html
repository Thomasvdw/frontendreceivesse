<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Onsite Display</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="screen">
      <div class="location-id" id="location-id"></div>
      <button id="change-location" class="change-location-button" type="button">
        Change location
      </button>

      <form id="location-form" hidden>
        <label for="location-id-input">Location ID</label>
        <input
          id="location-id-input"
          name="locationId"
          type="text"
          pattern="S[0-9]{4}[A-Z]{2}"
          placeholder="S0001NL"
          required
        />
        <button type="submit">Save</button>
      </form>

      <section class="welcome-wrap" aria-live="polite">
        <h1 class="welcome" data-i18n="locationWelcome"></h1>
        <h1 class="welcome" id="welcome">&nbsp;</h1>
      </section>

      <section class="bottom-panel" aria-live="polite">
        <div class="panel-card">
          <p class="panel-label" data-i18n="connectorsAvailable">
            Connectors Available
          </p>
          <p class="panel-value" id="connectors"></p>
        </div>

        <div class="panel-card">
          <p class="panel-label" data-i18n="chargingPrice">Charging Price</p>
          <p class="panel-value" id="price"></p>
        </div>

        <div class="panel-card panel-payments">
          <p class="panel-label" data-i18n="acceptedPaymentMethods">
            Accepted Payment Methods
          </p>
          <ul id="payments"></ul>
        </div>
      </section>
    </main>

    <script type="module" src="script.js"></script>
  </body>
</html>
